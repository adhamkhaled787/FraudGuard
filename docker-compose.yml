version: '3.8'

services:
  fraudguard-api:
    build: .
    container_name: fraudguard
    ports:
      - "8000:8000"    # host:container
    volumes:
      - ./data:/app/data        # mount data directory
      - ./models:/app/models    # mount models directory
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlflow:
    image: python:3.11-slim
    container_name: fraudguard-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      bash -c "pip install mlflow -q &&
               mlflow ui --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlruns"
    restart: unless-stopped