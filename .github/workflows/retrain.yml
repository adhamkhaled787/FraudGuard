test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn xgboost \
                      imbalanced-learn fastapi uvicorn \
                      joblib scipy pytest httpx

      - name: Download dataset
        run: |
          pip install kaggle
          mkdir -p data/raw data/processed models
          echo "Kaggle dataset would be downloaded here"
          echo "For CI we generate synthetic test data instead"

      - name: Generate synthetic model for CI
        run: |
          python - << 'EOF'
          import numpy as np
          import pandas as pd
          from sklearn.preprocessing import StandardScaler
          from xgboost import XGBClassifier
          import joblib, os, json

          os.makedirs("models", exist_ok=True)
          os.makedirs("data/processed", exist_ok=True)

          # Synthetic data matching real feature structure
          np.random.seed(42)
          n = 1000
          X = pd.DataFrame(
              np.random.randn(n, 28),
              columns=[f"V{i}" for i in range(1, 29)]
          )
          X["Amount_scaled"] = np.random.randn(n)
          y = np.random.randint(0, 2, n)

          # Train minimal model
          model = XGBClassifier(n_estimators=10, random_state=42)
          model.fit(X, y)
          joblib.dump(model, "models/fraudguard_model.pkl")

          # Save scaler
          scaler = StandardScaler()
          amount_df = pd.DataFrame({"Amount": np.random.randn(n) * 100})
          scaler.fit(amount_df)
          joblib.dump(scaler, "models/amount_scaler.pkl")

          # Save metrics
          metrics = {"f1": 0.75, "precision": 0.76,
                     "recall": 0.74, "roc_auc": 0.82,
                     "avg_precision": 0.78}
          with open("models/metrics.json", "w") as f:
              json.dump(metrics, f)

          print("Synthetic model generated for CI ✓")
          EOF

      - name: Run tests
        run: pytest tests/test_api.py -v