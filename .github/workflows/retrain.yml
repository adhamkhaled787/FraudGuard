name: FraudGuard CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # every Monday at 2am — weekly retrain

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn xgboost \
                      imbalanced-learn fastapi uvicorn \
                      joblib scipy pytest httpx

      - name: Run tests
        run: pytest tests/test_api.py -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fraudguard:latest .

      - name: Test Docker health
        run: |
          docker run -d -p 8000:8000 \
            --name fraudguard-test fraudguard:latest
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop fraudguard-test

  notify:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test, build-docker]
    if: always()

    steps:
      - name: Pipeline status
        run: |
          echo "================================"
          echo "FraudGuard CI/CD Pipeline"
          echo "================================"
          echo "Tests:  ${{ needs.test.result }}"
          echo "Docker: ${{ needs.build-docker.result }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "================================"